name: Build and Test
on: push
concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true
jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: NPM Install
        run: npm ci --ignore-scripts
      - name: Build
        run: npm run build
  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: NPM Install
        run: npm ci --ignore-scripts
      - name: Test
        run: npm test
      - name: Lint
        run: npm run lint
  e2e:
    name: E2E
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: NPM Install
        run: npm ci --ignore-scripts
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium
      # No `playwright install-deps`: the ubuntu-22.04 runner image already ships
      # Chromium's shared libraries (~18s saved). This couples us to the runner
      # image — if a browser launch fails after adding Firefox/WebKit or an image
      # slim-down, re-add: `npx playwright install-deps chromium`.
      - name: E2E tests
        run: npm run e2e
