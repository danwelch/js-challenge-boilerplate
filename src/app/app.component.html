<main class="app">
  <p class="sr-only" role="status" aria-live="polite">{{ statusMessage() }}</p>
  <header class="app__header">
    <h1 class="app__title">Kin OCR</h1>
  </header>

  <app-panel
    data-variant="upload"
    title="OCR File Upload"
    subtitle="Upload the scanner’s CSV export to review the policy numbers it captured."
  >
    <app-file-upload
      [error]="store.uploadError()"
      [currentFile]="store.sourceName()"
      [processing]="store.processing()"
      (fileSelected)="onFileSelected($event)"
      (validationError)="store.setError($event)"
      (reset)="store.reset()"
    />
  </app-panel>

  <app-panel data-variant="results" title="Results">
    @if (store.processing() || store.hasPolicies()) {
      <app-policy-table [policies]="store.policies()" [loading]="store.processing()" />
    } @else {
      <div class="results-empty">
        <lucide-icon
          class="results-empty__icon"
          [img]="emptyIcon"
          [size]="40"
          [strokeWidth]="1.5"
          aria-hidden="true"
        />
        <p class="results-empty__title">No policy numbers yet</p>
        <p class="results-empty__hint">Upload a CSV to get started.</p>
      </div>
    }
  </app-panel>
</main>
