<main class="app">
  <header class="app__header">
    <h1 class="app__title">Kin OCR</h1>
  </header>

  <app-panel data-variant="upload" title="OCR File Upload">
    <p panel-subtitle>
      Upload the scanner’s CSV export to review the policy numbers it captured.
    </p>
    <app-file-upload
      [error]="store.uploadError()"
      [currentFile]="store.sourceName()"
      [processing]="store.processing()"
      (fileSelected)="onFileSelected($event)"
      (validationError)="store.setError($event)"
      (reset)="store.reset()"
    />
  </app-panel>

  <app-panel data-variant="results" title="Results">
    @if (store.hasPolicies()) {
      <app-policy-table [policies]="store.policies()" />
    } @else {
      <div class="results-empty">
        <div class="results-empty__preview" aria-hidden="true">
          <app-policy-table [policies]="placeholderPolicies" />
        </div>
        <div class="results-empty__overlay">
          <div class="results-empty__card">
            <p class="results-empty__title">No policy numbers yet</p>
            <p class="results-empty__hint">
              Upload a CSV to get started.
            </p>
          </div>
        </div>
      </div>
    }
  </app-panel>
</main>
