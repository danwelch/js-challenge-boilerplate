<main class="app">
  <header class="app__header">
    <h1 class="app__title">Kin OCR</h1>
  </header>

  <app-panel variant="upload" title="OCR File Upload">
    <p class="app__panel-subtitle" panel-subtitle>
      Upload the scanner’s CSV export to review the policy numbers it captured.
    </p>
    <app-file-upload
      [error]="store.uploadError()"
      (fileSelected)="onFileSelected($event)"
      (validationError)="store.setError($event)"
    />
  </app-panel>

  <app-panel variant="results" title="Results">
    @if (store.hasPolicies()) {
      <span class="app__panel-title-count" panel-title-extra
        >for {{ store.sourceName() }}</span
      >
    } @else {
      <p class="app__panel-subtitle" panel-subtitle>
        No policy numbers loaded yet. Upload a CSV to get started.
      </p>
    }

    @if (store.hasPolicies()) {
      <app-policy-table [policies]="store.policies()" />
    }
  </app-panel>
</main>
