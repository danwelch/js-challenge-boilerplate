<div
  class="upload"
  [class.upload--processing]="processing()"
  [attr.aria-busy]="processing() ? 'true' : null"
>
  @if (currentFile(); as fileName) {
    <div class="upload__current">
      <lucide-icon
        [img]="FileCheckIcon"
        [size]="20"
        aria-hidden="true"
        class="upload__current-icon"
      />
      <span class="upload__current-label">Uploaded file:</span>
      <code class="upload__current-name">{{ fileName }}</code>
    </div>

    <div class="upload__actions">
      <label appButton size="sm" variant="primary" class="upload__button" for="policy-file">
        @if (processing()) {
          <lucide-icon [img]="SpinnerIcon" aria-hidden="true" class="upload__spinner" />
          <span>Processing…</span>
        } @else {
          <lucide-icon [img]="UploadIcon" aria-hidden="true" />
          <span>Choose another file</span>
        }
      </label>
      <button
        type="button"
        appButton
        size="sm"
        variant="ghost"
        (click)="onReset()"
      >
        <lucide-icon [img]="ResetIcon" aria-hidden="true" />
        <span>Reset</span>
      </button>
    </div>
  } @else {
    <div
      class="upload__dropzone"
      [class.upload__dropzone--dragging]="isDragging()"
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave($event)"
      (drop)="onDrop($event)"
    >
      <lucide-icon
        [img]="FileSpreadsheetIcon"
        [size]="28"
        aria-hidden="true"
        class="upload__dropzone-icon"
      />
      <p class="upload__dropzone-text">Drag &amp; drop a CSV file here, or</p>

      <label appButton size="sm" variant="primary" class="upload__button" for="policy-file">
        @if (processing()) {
          <lucide-icon [img]="SpinnerIcon" aria-hidden="true" class="upload__spinner" />
          <span>Processing…</span>
        } @else {
          <lucide-icon [img]="UploadIcon" aria-hidden="true" />
          <span>Upload policy CSV</span>
        }
      </label>

      <p class="upload__hint" id="upload-hint">CSV file only, up to 2 MB.</p>
    </div>
  }

  <!--
    Single hidden <input type="file"> shared by both modes — referenced by
    `for="policy-file"` on whichever <label appButton> is rendered above.
  -->
  <input
    id="policy-file"
    class="upload__input"
    type="file"
    accept=".csv,text/csv"
    (change)="onFileChange($event)"
    [attr.aria-describedby]="error() ? 'upload-hint upload-error' : 'upload-hint'"
    [attr.aria-invalid]="error() ? 'true' : null"
  />

  @if (error(); as err) {
    <app-alert id="upload-error" variant="error">
      @if (err.filename) {
        <code class="upload__error-filename">{{ err.filename }}</code>
      }
      {{ err.message }}
    </app-alert>
  }
</div>
