<div class="table-skeleton__header">
  <div class="table-skeleton__heading">
    <span class="table-skeleton__bar table-skeleton__bar--title"></span>
    <span class="table-skeleton__bar table-skeleton__bar--subtitle"></span>
  </div>
  <span class="table-skeleton__bar table-skeleton__bar--filter"></span>
</div>
<div class="table-skeleton__scroll">
  <table class="table-skeleton__table">
    <thead>
      <tr>
        <th scope="col" class="table-skeleton__col-index">#</th>
        <th scope="col">Policy number</th>
        <th scope="col" class="table-skeleton__col-status">Status</th>
      </tr>
    </thead>
    <tbody>
      @for (row of skeletonRows(); track $index) {
        <tr>
          <td class="table-skeleton__col-index">
            <span class="table-skeleton__bar table-skeleton__bar--index"></span>
          </td>
          <td>
            <span class="table-skeleton__bar table-skeleton__bar--number"></span>
          </td>
          <td class="table-skeleton__col-status">
            <span class="table-skeleton__circle"></span>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
<div class="table-skeleton__footer">
  <span class="table-skeleton__bar table-skeleton__bar--pagesize"></span>
  <span class="table-skeleton__bar table-skeleton__bar--pagination"></span>
</div>
